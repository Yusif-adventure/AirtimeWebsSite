name: Keep Backend Alive

on:
  schedule:
    - cron: "*/13 * * * *" # Run every 13 minutes to prevent 15-min sleep
  workflow_dispatch: # Allow manual run

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -I https://airtimewebssite.onrender.com/functions/v1/health
